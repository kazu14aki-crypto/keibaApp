services:
  # --- バックエンド（FastAPI） ---
  - type: web
    name: kirisuite-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_HOURS
        value: "168"
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # --- フロントエンド（React/Vite） ---
  - type: web
    name: kirisuite-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
